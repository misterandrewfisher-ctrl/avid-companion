name: Build Avid Companion Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_AVID_API_BASE=${{ secrets.VITE_AVID_API_BASE }}" >> .env
          echo "VITE_COMPANION_SECRET=${{ secrets.VITE_COMPANION_SECRET }}" >> .env
          echo "VITE_SUPABASE_URL=https://burcdoowolryklggsgkj.supabase.co" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_wunQ43nqsnYde5DGvPrUcQ_pt5UbBkZ" >> .env

      - name: Sync version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tc = Get-Content src-tauri/tauri.conf.json -Raw
          $tc = $tc -replace '"version": "\d+\.\d+\.\d+"', "`"version`": `"$version`""
          $tc | Set-Content src-tauri/tauri.conf.json
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '^version = "\d+\.\d+\.\d+"', "version = `"$version`""
          $cargo | Set-Content src-tauri/Cargo.toml

      - name: Build frontend
        run: bun run build

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi

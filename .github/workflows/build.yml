name: Build Avid Companion

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.1). Leave blank to use tauri.conf.json."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $inp = "${{ github.event.inputs.version }}"
          if ($inp -and $inp.Trim() -ne "") {
            $v = $inp.Trim()
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
            $v = $conf.version
          }
          Write-Host "Using version $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # Sync package.json + tauri.conf.json + Cargo.toml to that version
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '("version"\s*:\s*")[^"]+(")', "`${1}$v`${2}" | Set-Content src-tauri/tauri.conf.json
          (Get-Content package.json -Raw)             -replace '("version"\s*:\s*")[^"]+(")', "`${1}$v`${2}" | Set-Content package.json
          (Get-Content src-tauri/Cargo.toml -Raw)     -replace '(?m)^version\s*=\s*".+?"$', "version = ""$v""" | Set-Content src-tauri/Cargo.toml

      - name: Write .env for Vite
        shell: pwsh
        run: |
          @"
          VITE_AVID_API_BASE=${{ secrets.VITE_AVID_API_BASE }}
          VITE_COMPANION_SECRET=${{ secrets.VITE_COMPANION_SECRET }}
          "@ | Set-Content -Encoding utf8 .env

      - name: Install JS deps
        run: bun install

      - name: Build web frontend
        run: bun run build

      - name: Build Tauri (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx @tauri-apps/cli@2 build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: avid-companion-${{ steps.ver.outputs.version }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig

      - name: Build latest.json (updater manifest)
        id: manifest
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $sigFile = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          $exeFile = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe     -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sigFile -or -not $exeFile) { throw "Signed NSIS bundle not found. Ensure TAURI_SIGNING_PRIVATE_KEY is set." }
          $sig = Get-Content $sigFile.FullName -Raw
          $url = "https://github.com/${{ github.repository }}/releases/download/v$v/$($exeFile.Name)"
          $json = @{
            version = "$v"
            notes   = "Avid Companion $v"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{ signature = $sig; url = $url }
            }
          } | ConvertTo-Json -Depth 6
          Set-Content -Path latest.json -Value $json -Encoding utf8
          Copy-Item $exeFile.FullName "avid-companion_${v}_x64-setup.exe"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Avid Companion v${{ steps.ver.outputs.version }}
          files: |
            avid-companion_${{ steps.ver.outputs.version }}_x64-setup.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json

name: Build Avid Companion Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Create .env
        shell: bash
        run: |
          cat > .env <<EOF
          VITE_SUPABASE_URL=https://burcdoowolryklggsgkj.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_wunQ43nqsnYde5DGvPrUcQ_pt5UbBkZ
          VITE_AVID_API_BASE=${{ secrets.VITE_AVID_API_BASE }}
          VITE_COMPANION_SECRET=${{ secrets.VITE_COMPANION_SECRET }}
          EOF

      - name: Preflight — verify env
        shell: bash
        run: |
          echo "Checking .env contents (values hidden)..."
          MISSING=0
          for KEY in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY VITE_AVID_API_BASE VITE_COMPANION_SECRET; do
            VAL=$(grep "^${KEY}=" .env | cut -d= -f2-)
            if [ -z "$VAL" ]; then
              echo "❌ MISSING: $KEY"
              MISSING=1
            else
              echo "✅ $KEY is set (${#VAL} chars)"
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "Add the missing values under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
